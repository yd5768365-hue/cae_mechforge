<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MechForge AI - Test Runner</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Courier New', monospace;
      background: #0a0e14;
      color: #c8d8e0;
      padding: 20px;
      min-height: 100vh;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
      padding: 20px;
      border-bottom: 1px solid #1a2535;
    }

    .header h1 {
      color: #00e5ff;
      font-size: 24px;
      margin-bottom: 10px;
    }

    .header p {
      color: #8ab4c8;
      font-size: 14px;
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-bottom: 30px;
    }

    .stat {
      text-align: center;
      padding: 15px 25px;
      background: rgba(0, 229, 255, 0.05);
      border: 1px solid rgba(0, 229, 255, 0.1);
      border-radius: 8px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: bold;
      color: #00e5ff;
    }

    .stat-label {
      font-size: 12px;
      color: #8ab4c8;
      margin-top: 5px;
    }

    .stat.success .stat-value { color: #2ed573; }
    .stat.fail .stat-value { color: #ff4757; }

    .test-suite {
      margin-bottom: 20px;
      border: 1px solid #1a2535;
      border-radius: 8px;
      overflow: hidden;
    }

    .suite-header {
      background: rgba(0, 229, 255, 0.05);
      padding: 12px 16px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .suite-header:hover {
      background: rgba(0, 229, 255, 0.1);
    }

    .suite-name {
      font-weight: 600;
      color: #c8d8e0;
    }

    .suite-status {
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 4px;
    }

    .suite-status.pass {
      background: rgba(46, 213, 115, 0.2);
      color: #2ed573;
    }

    .suite-status.fail {
      background: rgba(255, 71, 87, 0.2);
      color: #ff4757;
    }

    .suite-tests {
      display: none;
    }

    .suite-tests.expanded {
      display: block;
    }

    .test-case {
      padding: 10px 16px;
      border-top: 1px solid #1a2535;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .test-case:hover {
      background: rgba(255, 255, 255, 0.02);
    }

    .test-name {
      font-size: 13px;
    }

    .test-status {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 3px;
    }

    .test-status.pass {
      background: rgba(46, 213, 115, 0.15);
      color: #2ed573;
    }

    .test-status.fail {
      background: rgba(255, 71, 87, 0.15);
      color: #ff4757;
    }

    .test-error {
      font-size: 11px;
      color: #ff4757;
      margin-top: 5px;
      padding: 8px;
      background: rgba(255, 71, 87, 0.05);
      border-radius: 4px;
    }

    .controls {
      text-align: center;
      margin-bottom: 30px;
    }

    .btn {
      padding: 10px 20px;
      border: 1px solid rgba(0, 229, 255, 0.3);
      background: rgba(0, 229, 255, 0.1);
      color: #00e5ff;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      transition: all 0.2s;
    }

    .btn:hover {
      background: rgba(0, 229, 255, 0.2);
      box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
    }

    .progress-bar {
      width: 100%;
      height: 4px;
      background: #1a2535;
      border-radius: 2px;
      margin-bottom: 30px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00e5ff, #00b8d4);
      transition: width 0.3s ease;
    }

    .console-output {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid #1a2535;
      border-radius: 8px;
      padding: 15px;
      font-size: 12px;
      max-height: 300px;
      overflow-y: auto;
    }

    .console-line {
      margin-bottom: 5px;
      padding: 3px 0;
    }

    .console-line.log { color: #8ab4c8; }
    .console-line.info { color: #00e5ff; }
    .console-line.warn { color: #ffa502; }
    .console-line.error { color: #ff4757; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🧪 MechForge AI Test Runner</h1>
    <p>JavaScript Unit Tests</p>
  </div>

  <div class="controls">
    <button class="btn" onclick="runAllTests()">▶ Run All Tests</button>
    <button class="btn" onclick="clearResults()">🗑 Clear</button>
  </div>

  <div class="progress-bar">
    <div class="progress-fill" id="progress" style="width: 0%"></div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="total-tests">0</div>
      <div class="stat-label">Total Tests</div>
    </div>
    <div class="stat success">
      <div class="stat-value" id="passed-tests">0</div>
      <div class="stat-label">Passed</div>
    </div>
    <div class="stat fail">
      <div class="stat-value" id="failed-tests">0</div>
      <div class="stat-label">Failed</div>
    </div>
  </div>

  <div id="test-results"></div>

  <div class="console-output" id="console-output">
    <div class="console-line info">Ready to run tests...</div>
  </div>

  <!-- Load Core Modules -->
  <script src="../core/utils.js"></script>
  <script src="../core/event-bus.js"></script>
  <script src="../core/cache-manager.js"></script>
  <script src="../core/debounce-throttle.js"></script>
  <script src="../core/validator.js"></script>
  <script src="../core/i18n.js"></script>

  <!-- Load Test Framework -->
  <script src="test-framework.js"></script>

  <!-- Load Tests -->
  <script src="unit/utils.test.js"></script>
  <script src="unit/cache.test.js"></script>
  <script src="unit/validator.test.js"></script>
  <script src="unit/i18n.test.js"></script>

  <script>
    // Test Runner UI
    const resultsContainer = document.getElementById('test-results');
    const consoleOutput = document.getElementById('console-output');
    const progressBar = document.getElementById('progress');

    let testResults = {
      total: 0,
      passed: 0,
      failed: 0,
      suites: []
    };

    function log(message, type = 'log') {
      const line = document.createElement('div');
      line.className = `console-line ${type}`;
      line.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      consoleOutput.appendChild(line);
      consoleOutput.scrollTop = consoleOutput.scrollHeight;
    }

    function updateStats() {
      document.getElementById('total-tests').textContent = testResults.total;
      document.getElementById('passed-tests').textContent = testResults.passed;
      document.getElementById('failed-tests').textContent = testResults.failed;

      const progress = testResults.total > 0
        ? ((testResults.passed + testResults.failed) / testResults.total) * 100
        : 0;
      progressBar.style.width = `${progress}%`;
    }

    function renderResults() {
      resultsContainer.innerHTML = '';

      testResults.suites.forEach((suite, index) => {
        const suiteEl = document.createElement('div');
        suiteEl.className = 'test-suite';

        const allPassed = suite.tests.every(t => t.passed);

        suiteEl.innerHTML = `
          <div class="suite-header" onclick="toggleSuite(${index})">
            <span class="suite-name">📁 ${suite.name}</span>
            <span class="suite-status ${allPassed ? 'pass' : 'fail'}">
              ${suite.tests.filter(t => t.passed).length}/${suite.tests.length}
            </span>
          </div>
          <div class="suite-tests expanded" id="suite-${index}">
            ${suite.tests.map(test => `
              <div class="test-case">
                <div>
                  <div class="test-name">${test.passed ? '✓' : '✗'} ${test.name}</div>
                  ${test.error ? `<div class="test-error">${test.error}</div>` : ''}
                </div>
                <span class="test-status ${test.passed ? 'pass' : 'fail'}">
                  ${test.passed ? 'PASS' : 'FAIL'}
                </span>
              </div>
            `).join('')}
          </div>
        `;

        resultsContainer.appendChild(suiteEl);
      });
    }

    function toggleSuite(index) {
      const suite = document.getElementById(`suite-${index}`);
      suite.classList.toggle('expanded');
    }

    async function runAllTests() {
      log('Starting test run...', 'info');
      clearResults();

      // Run tests from test framework
      if (window.TestFramework) {
        await TestFramework.runAll();
      }

      log(`Test run complete: ${testResults.passed} passed, ${testResults.failed} failed`, 'info');
    }

    function clearResults() {
      testResults = { total: 0, passed: 0, failed: 0, suites: [] };
      resultsContainer.innerHTML = '';
      consoleOutput.innerHTML = '<div class="console-line info">Ready to run tests...</div>';
      updateStats();
    }

    // Listen for test events
    window.addEventListener('test-start', (e) => {
      log(`Running: ${e.detail.suite} > ${e.detail.test}`);
    });

    window.addEventListener('test-pass', (e) => {
      testResults.passed++;
      updateStats();
    });

    window.addEventListener('test-fail', (e) => {
      testResults.failed++;
      log(`FAILED: ${e.detail.suite} > ${e.detail.test} - ${e.detail.error}`, 'error');
      updateStats();
    });

    window.addEventListener('suite-complete', (e) => {
      testResults.suites.push(e.detail);
      testResults.total += e.detail.tests.length;
      renderResults();
      updateStats();
    });

    // Auto-run on load
    window.addEventListener('load', () => {
      setTimeout(runAllTests, 500);
    });
  </script>
</body>
</html>
