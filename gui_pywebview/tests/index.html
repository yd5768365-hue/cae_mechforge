<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MechForge AI - Unit Tests</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Courier New', monospace;
      background: #0a0e14;
      color: #c8d8e0;
      padding: 20px;
      line-height: 1.6;
    }

    h1 {
      color: #00e5ff;
      margin-bottom: 20px;
      font-size: 24px;
    }

    .summary {
      background: #111820;
      border: 1px solid #1a2535;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .summary-item {
      display: flex;
      justify-content: space-between;
      margin: 5px 0;
    }

    .passed { color: #2ed573; }
    .failed { color: #ff4757; }
    .skipped { color: #ffa502; }

    #output {
      white-space: pre-wrap;
      font-size: 14px;
    }

    .loading {
      color: #00e5ff;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    button {
      background: #00e5ff;
      color: #0a0e14;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-weight: bold;
      margin-bottom: 20px;
    }

    button:hover {
      background: #00b8d4;
    }
  </style>
</head>
<body>
  <h1>🧪 MechForge AI - Unit Tests</h1>
  <button onclick="runTests()">Run Tests</button>
  <div id="output" class="loading">Loading test framework...</div>

  <!-- Test Framework -->
  <script src="test-framework.js"></script>

  <!-- Core Modules -->
  <script src="../core/utils.js"></script>

  <!-- Tests -->
  <script src="utils.test.js"></script>

  <script>
    async function runTests() {
      const output = document.getElementById('output');
      output.textContent = 'Running tests...\n\n';
      output.className = 'loading';

      // Reset framework
      TestFramework.reset();

      // Reload test files
      const scripts = document.querySelectorAll('script[src$=".test.js"]');
      for (const script of scripts) {
        const newScript = document.createElement('script');
        newScript.src = script.src;
        script.parentNode.replaceChild(newScript, script);
      }

      // Wait for scripts to load
      await new Promise(resolve => setTimeout(resolve, 100));

      // Run tests
      const results = await TestFramework.run();

      // Update UI
      output.className = '';

      // Show summary
      const summary = document.createElement('div');
      summary.className = 'summary';
      summary.innerHTML = `
        <div class="summary-item">
          <span>Total Tests:</span>
          <span>${results.total}</span>
        </div>
        <div class="summary-item">
          <span>Passed:</span>
          <span class="passed">${results.passed} ✅</span>
        </div>
        <div class="summary-item">
          <span>Failed:</span>
          <span class="failed">${results.failed} ❌</span>
        </div>
        <div class="summary-item">
          <span>Skipped:</span>
          <span class="skipped">${results.skipped} ⏭️</span>
        </div>
        <div class="summary-item">
          <span>Status:</span>
          <span class="${results.success ? 'passed' : 'failed'}">
            ${results.success ? 'All Passed! 🎉' : 'Some Tests Failed'}
          </span>
        </div>
      `;

      document.body.insertBefore(summary, output);
    }

    // Auto-run on load
    window.addEventListener('load', () => {
      setTimeout(runTests, 500);
    });
  </script>
</body>
</html>
